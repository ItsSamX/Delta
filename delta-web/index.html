<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#070709">
  <meta name="color-scheme" content="dark">
  <title>Delta — JEE Study Platform</title>
  <meta name="description" content="Premium study companion for JEE aspirants">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">

  <!-- Styles -->
  <link rel="stylesheet" href="/src/styles/variables.css">
  <link rel="stylesheet" href="/src/styles/base.css">
  <link rel="stylesheet" href="/src/styles/components.css">
  <link rel="stylesheet" href="/src/styles/layout.css">
  <link rel="stylesheet" href="/src/styles/pages.css">
  <link rel="stylesheet" href="/src/styles/animations.css">

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="/public/icons/logo.svg">
</head>
<body>
  <!-- Loading Screen -->
  <div id="loading-screen" class="loading-screen">
    <div class="loading-content">
      <div class="loading-logo">Δ</div>
      <div class="loading-text">Delta</div>
      <div class="loading-spinner"></div>
      <div class="loading-status">Loading your journey...</div>
      <div class="loading-progress">
        <div class="loading-progress-bar"></div>
      </div>
    </div>
  </div>

  <!-- App Shell -->
  <div id="app" class="app" style="display: none;">
    <nav id="top-nav" class="top-nav"></nav>
    <nav id="bottom-nav" class="bottom-nav"></nav>
    <main id="main-content" class="main-content"></main>
  </div>

  <!-- Scripts -->
  <script type="module" src="/src/main.js"></script>
</body>
</html>
